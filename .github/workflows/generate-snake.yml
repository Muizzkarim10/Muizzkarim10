name: Generate Snake

on:
  # Run workflow every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Allows workflow to be run manually
  workflow_dispatch:

  # Automatically run on new commit to the readme
  push:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Download the snake animation script
      - name: Checkout the repository
        uses: actions/checkout@v2

      # Generate the snake based on your contribution graph
      - name: Generate Snake
        uses: Platane/snk@v2
        with:
          github_user_name: Muizzkarim10  # Replace with your GitHub username
          outputs: dist/snake.svg

      # Upload the generated snake.svg file to the repository
      - name: Commit the Snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Updated the snake animation"
          git push
